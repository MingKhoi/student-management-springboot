<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Student Detail</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            padding: 40px;
            margin: 0;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        .info {
            margin-bottom: 12px;
            font-size: 16px;
        }

        .label {
            font-weight: bold;
            color: #555;
        }

        .value {
            color: #222;
        }

        .actions {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
        }

        .btn {
            padding: 8px 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-edit {
            background-color: #007bff;
            color: white;
        }

        .btn-edit:hover {
            background-color: #0056b3;
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background-color: #b52a37;
        }

        .btn-back {
            background-color: #6c757d;
            color: white;
            text-align: center;
            display: block;
            margin-top: 20px;
        }

        .btn-back:hover {
            background-color: #545b62;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Student Detail</h2>

        <div class="info">
            <span class="label">ID:</span>
            <span class="value" th:text="${student.id}"></span>
        </div>

        <div class="info">
            <span class="label">Name:</span>
            <span class="value" th:text="${student.name}"></span>
        </div>

        <div class="info">
            <span class="label">Email:</span>
            <span class="value" th:text="${student.email}"></span>
        </div>

        <div class="info">
            <span class="label">Age:</span>
            <span class="value" th:text="${student.age}"></span>
        </div>

        <div class="actions">
            <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-edit">Edit</a>

            <form th:action="@{/students/delete/{id}(id=${student.id})}" method="post"
                onsubmit="return confirm('Are you sure you want to delete?')">

                <button type="submit" class="btn btn-delete">Delete</button>
            </form>
        </div>

        <a href="/students" class="btn btn-back">Back to List</a>
    </div>

</body>

</html>
