<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"> <!-- Khai bao namespace de dung th:* -->

<head>
    <meta charset="UTF-8">
    <title>Danh Sach Sinh Vien</title>
    <!-- CSS don gian -->
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .text-danger {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>Danh Sach Sinh Vien (SSR)</h1>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="header-actions">
        <a href="/students/new" class="btn btn-success">Thêm mới</a>
    </div>

    <form class="search-form" action="/students" method="get">
        <input type="text" name="keyword" placeholder="Nhap ten ...">
        <button type="submit">Tim</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Ho va Ten</th>
                <th>Email</th>
                <th>Tuoi</th>
            </tr>
        </thead>
        <tbody>
            <!-- Cu phap Thymeleaf: Duyet qua danh sach "dsSinhVien" -->
            <!-- th:each="bien_tam : ${key_trong_model}" -->
            <tr th:each="student : ${dsSinhVien}" th:class="${student.age < 18} ? 'text-danger' : ''">
                <td th:text="${student.id}">ID Mau</td>
                <td th:text="${student.name}">Ten Mau</td>
                <td th:text="${student.email}">Email Mau</td>
                <td th:text="${student.age}">0</td>
            <td>
                <a th:href="@{/students/{id}(id=${student.id})" class="btn btn-primary">Xem chi tiết</a>
                <a th:href="@{/students/{id}/edit(id=${student.id})" class="btn btn-primary">Chỉnh sửa</a>
                <form th:action="@{/students/{id}/delete(id=${student.id})}" method="post" style="display: inline;" onsubmit="return confirm('Bạn có chắc chắn?');">
                    <button type="submit" class="btn btn-danger">Xóa</button>
                </form>
            </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
